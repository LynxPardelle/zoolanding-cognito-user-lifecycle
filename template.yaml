AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Cognito user lifecycle trigger Lambda

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - test
      - prod
    Description: Deployment environment for the lifecycle trigger.
  ProfileConfigJsonBase64:
    Type: String
    Default: eyJ2ZXJzaW9uIjoxLCJwcm9maWxlcyI6W119
    NoEcho: true
    Description: Base64-encoded non-secret JSON profile allowlist. Avoids shell parsing issues with raw JSON parameter values.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
    Description: Lambda log level.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 10
    MemorySize: 128
    Tracing: PassThrough

Resources:
  CognitoUserLifecycleFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName:
        Fn::Sub: ${AWS::StackName}-FunctionRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CognitoUserLifecyclePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminAddUserToGroup
                Resource:
                  Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*

  CognitoUserLifecycleFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      FunctionName:
        Fn::Sub: ${AWS::StackName}-Function
      Description: Assigns server-approved tenant attributes and groups to Cognito users.
      Role:
        Fn::GetAtt:
          - CognitoUserLifecycleFunctionRole
          - Arn
      Environment:
        Variables:
          ENVIRONMENT_NAME:
            Ref: EnvironmentName
          PROFILE_CONFIG_JSON_BASE64:
            Ref: ProfileConfigJsonBase64
          LOG_LEVEL:
            Ref: LogLevel

  CognitoTriggerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName:
        Ref: CognitoUserLifecycleFunction
      Principal: cognito-idp.amazonaws.com
      SourceAccount:
        Ref: AWS::AccountId
      SourceArn:
        Fn::Sub: arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*

Outputs:
  FunctionName:
    Description: Cognito lifecycle Lambda function name.
    Value:
      Ref: CognitoUserLifecycleFunction
  FunctionArn:
    Description: Cognito lifecycle Lambda function ARN for user-pool trigger attachment.
    Value:
      Fn::GetAtt:
        - CognitoUserLifecycleFunction
        - Arn
