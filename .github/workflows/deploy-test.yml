name: Deploy Test

on:
  push:
    branches: [test]

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Require dev merge
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin dev test
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          if [[ "$parent_count" -lt 2 ]]; then
            echo "Deploying test requires a merge commit from dev."
            exit 1
          fi
          second_parent="$(git rev-list --parents -n 1 HEAD | awk '{print $3}')"
          git merge-base --is-ancestor "$second_parent" origin/dev

  deploy:
    runs-on: ubuntu-latest
    needs: guard
    environment: test
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up SAM
        uses: aws-actions/setup-sam@v2
      - name: Validate profile config
        shell: bash
        env:
          PROFILE_CONFIG_JSON_BASE64: ${{ vars.PROFILE_CONFIG_JSON_BASE64 }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64, json, os, pathlib
          raw = os.environ.get("PROFILE_CONFIG_JSON_BASE64", "")
          if not raw:
              raise SystemExit("PROFILE_CONFIG_JSON_BASE64 is required for deploy")
          decoded = base64.b64decode(raw).decode("utf-8")
          parsed = json.loads(decoded)
          compact = json.dumps(parsed, separators=(",", ":")).encode("utf-8")
          pathlib.Path("profile-config.compact.b64").write_text(base64.b64encode(compact).decode("ascii"), encoding="utf-8")
          PY
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Test and deploy
        shell: bash
        run: |
          set -euo pipefail
          python -m unittest discover -s tests -p "test_*.py"
          sam validate
          sam build --no-cached
          PROFILE_CONFIG_JSON_BASE64="$(cat profile-config.compact.b64)"
          sam deploy --config-env test --no-confirm-changeset --no-fail-on-empty-changeset --parameter-overrides "EnvironmentName=test" "ProfileConfigJsonBase64=${PROFILE_CONFIG_JSON_BASE64}" "LogLevel=INFO"
