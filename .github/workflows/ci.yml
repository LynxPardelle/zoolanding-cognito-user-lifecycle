name: CI

on:
  push:
    branches: [dev, test, main]
  pull_request:
    branches: [dev, test, main]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Enforce promotion graph
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.base_ref }}"
            head="${{ github.head_ref }}"
            if [[ "$base" == "test" && "$head" != "dev" ]]; then
              echo "Pull requests into test must come from dev."
              exit 1
            fi
            if [[ "$base" == "main" && "$head" != "test" ]]; then
              echo "Pull requests into main must come from test."
              exit 1
            fi
            exit 0
          fi

          branch="${GITHUB_REF_NAME}"
          if [[ "$branch" != "test" && "$branch" != "main" ]]; then
            exit 0
          fi

          git fetch origin dev test main
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF-1}')"
          if [[ "$parent_count" -lt 2 ]]; then
            echo "Push deployments to $branch require a merge commit."
            exit 1
          fi
          second_parent="$(git rev-list --parents -n 1 HEAD | awk '{print $3}')"
          expected="origin/dev"
          if [[ "$branch" == "main" ]]; then
            expected="origin/test"
          fi
          git merge-base --is-ancestor "$second_parent" "$expected"

  test:
    runs-on: ubuntu-latest
    needs: guard
    env:
      AWS_DEFAULT_REGION: us-east-1
      AWS_REGION: us-east-1
      SAM_CLI_TELEMETRY: 0
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
      - name: Run unit tests
        env:
          LOG_LEVEL: ERROR
        run: python -m unittest discover -s tests -p "test_*.py"
      - name: Run dependency audit
        run: pip-audit -r requirements.txt
      - name: Set up SAM
        uses: aws-actions/setup-sam@v3
      - name: Validate SAM template
        run: sam validate
